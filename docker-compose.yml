version: '3.8'

services:
  db:
    image: postgres:15
    container_name: aicrm_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aicrm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aicrm_redis
    restart: always
    ports:
      - "6379:6379"

  client:
    build:
      context: ./client
    container_name: aicrm_client
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  server:
    build:
      context: ./server
    container_name: aicrm_server
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aicrm?schema=public
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npx nodemon src/server.ts
    depends_on:
      - db
      - redis

volumes:
  pgdata:
